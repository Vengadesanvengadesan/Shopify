    <script>
function calculateSum(num1, num2){
    return num1 + num2;
}

function calculateProduct(num1, num2){
    return num1 * num2;
}

let num1 = 10;
let num2 = 90;
let num3 = 10;
let num4 = 2;

let sum = calculateSum(num1, num2);
let product = calculateProduct(num3, num4);

console.log(`Sum of ${num1} and ${num2} is: ${sum}`);
console.log(`Product of ${num3} and ${num4} is: ${product}`);
</script>
