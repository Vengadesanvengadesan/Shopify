<script>

function calculateDiscount(price, discount=20){
    
    let finalPrice = price - (price * discount / 100);
    return finalPrice;
}

let priceWithDiscount = calculateDiscount(1000, 10);


let priceWithDefault = calculateDiscount(1000);

console.log("Final price with 10% discount:", priceWithDiscount);
console.log("Final price with default discount (20%):", priceWithDefault);

</script>
