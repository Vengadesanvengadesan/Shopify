<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task-10</title>
</head>

<body>

<form id="sub">

<label>
Email:
<input type="email" placeholder="example@gmail.com" id="mail">
</label>

<br><br>

<label>
Password:
<input type="password" placeholder="Enter password" id="pass">
</label>

<br><br>

<button type="submit">Submit</button>

</form>

<script>

let sub = document.getElementById("sub");

sub.addEventListener("submit",(event)=>{

event.preventDefault();

let email = document.getElementById("mail").value.trim();
let pass = document.getElementById("pass").value.trim();

mainValidation(email,pass);

});


function checkEmpty(email,pass){
    if(email === "" || pass === ""){
        console.log("Error: Fields cannot be empty");
        return false;
    }
    return true;
}

function validateEmail(email){
    let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(!emailPattern.test(email)){
        console.log("Error: Invalid email format");
        return false;
    }
    return true;
}


function validatePassword(pass){
    if(pass.length < 8){
        console.log("Error: Password must be at least 8 characters");
        return false;
    }
    return true;
}

function mainValidation(email,pass){

if(!checkEmpty(email,pass)) return;

if(!validateEmail(email)) return;

if(!validatePassword(pass)) return;

console.log("Form validation successful");

}

</script>

</body>
</html>
