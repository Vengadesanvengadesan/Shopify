<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 9 - Inventory</title>
</head>
<body>

    <table border="1" id="inventoryTable">
        </table>

    <script>
       
        let inventory = [ 
            { product: "Pen", quantity: 10 }, 
            { product: "Notebook", quantity: 5 }, 
            { product: "Eraser", quantity: 0 } 
        ]; 

        let table = document.getElementById("inventoryTable");

      
        function renderTable() {
           
            table.innerHTML = `
                <tr>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Actions</th>
                </tr>
            `;
            
            
            inventory.forEach((item, index) => {
                let row = document.createElement("tr");

                row.innerHTML = `
                    <td>${item.product}</td>
                    <td>${item.quantity}</td>
                    <td>
                        <button onclick="changeQty(${index}, 1)">Increase</button>
                        <button onclick="changeQty(${index}, -1)">Decrease</button>
                    </td>
                `;

                table.appendChild(row);
            });
        }

    
        function changeQty(index, amount) {
            let currentItem = inventory[index];

          
            if (amount === -1 && currentItem.quantity <= 0) {
                alert("Quantity cannot go below zero!");
            } else {
             
                currentItem.quantity += amount;
             
                renderTable();
                console.log("Updated Array:", inventory);
            }
        }

        renderTable();
    </script>

</body>
</html>
