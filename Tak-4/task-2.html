<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 2 - Product Filter</title>
  <style>
    body {
       font-family: sans-serif; 
       padding: 20px;
       }
    .filter-section {
       background: #f4f4f4;
        padding: 15px; 
        border-radius: 8px; 
        margin-bottom: 20px; 
      }
    .product-card { 
      border: 1px solid #ddd;
       padding: 10px; 
       margin: 10px 0;
        border-radius: 5px;
       }
    input, select { 
      margin-right: 10px;
       padding: 5px;
       }
  </style>
</head>
<body>

  <h2>Product Catalog</h2>

  <div class="filter-section">
    <label>Category:</label>
    <select id="categoryFilter">
      <option value="All">All Categories</option>
      <option value="Electronics">Electronics</option>
      <option value="Clothing">Clothing</option>
    </select>

    <label>Min Price:</label>
    <input type="number" id="minPrice" placeholder="0">

    <label>Max Price:</label>
    <input type="number" id="maxPrice" placeholder="100000">

    <button onclick="applyFilters()">Filter Products</button>
  </div>

  <div id="productDisplay"></div>

  <script>
    
    const productList = [
      { name: "Laptop", price: 25000, category: "Electronics" },
      { name: "Shirt", price: 1200, category: "Clothing" },
      { name: "Phone", price: 15000, category: "Electronics" },
      { name: "Jeans", price: 2500, category: "Clothing" },
      { name: "Headphones", price: 5000, category: "Electronics" }
    ];

    const displayContainer = document.getElementById('productDisplay');

    function renderProducts(data) {
      displayContainer.innerHTML = "";

    
      if (data.length === 0) {
        displayContainer.innerHTML = "<h3>No products found matching your criteria.</h3>";
        return;
      }

      data.forEach(p => {
        const card = document.createElement("div");
        card.className = "product-card";
        card.innerHTML = `<strong>${p.name}</strong> - ${p.price} <br> <small>Category: ${p.category}</small>`;
        displayContainer.appendChild(card);
      });
    }

  
    function applyFilters() {
      const selectedCategory = document.getElementById("categoryFilter").value;
      const min = Number(document.getElementById("minPrice").value) || 0;
      const max = Number(document.getElementById("maxPrice").value) || Infinity;

      const filtered = productList.filter(p => {
        const matchesCategory = selectedCategory === "All" || p.category === selectedCategory;
        const matchesPrice = p.price >= min && p.price <= max;
        return matchesCategory && matchesPrice;
      });

      renderProducts(filtered);
    }

    
    renderProducts(productList);
  </script>
</body>
</html>
